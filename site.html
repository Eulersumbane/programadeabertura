<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake site</title>
    <style>

      body{
        background-color: aqua;
      }
    .form-box {
  width: 300px;
  margin: 50px auto;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-family: Arial, sans-serif;
}

.form-box h2 {
  text-align: center;
}

.form-box input, .form-box button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 4px;
  border: 1px solid #aaa;
}

.form-box button {
  background-color: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}

.form-box button:hover {
  background-color: #0056b3;
}

  </style>

</head>
<body>
  <div class="form-box">
  <h2>Cadastro</h2>
  <p>O continente enfreta uma escassez de falta de profissionais de TI</p>
  <p>Cadastre-se para ver as vagas de emprego na europa nomeadamente:</p>
  <p>Alemanha, Espanha , Turquia e Grecia</p>
  
  <form onsubmit="return simular(event)">
    <input type="text" name="nome" placeholder="Nome completo" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefone" placeholder="Telefone" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <button type="submit">Cadastrar</button>
  </form>
  <p>⚠️ Este é apenas um exemplo educativo de phishing. Nenhum dado é coletado.</p>
</div>

<script>
  function simular(event) {
    event.preventDefault(); // impede envio real

    // Captura os valores digitados (simulação, sem armazenar)
    const nome = document.querySelector('[name="nome"]').value;
    const email = document.querySelector('[name="email"]').value;
    const telefone = document.querySelector('[name="telefone"]').value;
    const senha = document.querySelector('[name="senha"]').value;

    // Aqui você poderia registrar em log fictício
    console.log("Tentativa simulada:", { nome, email, telefone, senha });

    // Só depois de "submeter" aparece o alerta
    alert("Se fosse um ataque real, seus dados poderiam ser roubados!\n\nNome: " 
          + nome + "\nEmail: " + email + "\nTelefone: " + telefone);

    return false;
  }
</script>

</body>
</html>
