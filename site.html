<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake site</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }

    h2 {
      color: #1877f2;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #1877f2;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #145db2;
    }

    p {
      font-size: 12px;
      color: #555;
      margin-top: 15px;
    }
  </style>

</head>
<body>
  <div class="container">
    <h2>Banco Falso</h2>
    <input type="text" placeholder="Usuário"><br>
    <input type="password" placeholder="Senha"><br>
    <button onclick="simular()">Entrar</button>
    <p>⚠️ Este é apenas um exemplo educativo de phishing.</p>
  </div>

  <script>
    function simular() {
      alert("Se fosse um ataque real, seus dados poderiam ser roubados!");
    }
  </script>
</body>
</html>
